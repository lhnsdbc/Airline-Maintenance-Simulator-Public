name: verify-live-demo

on:
  schedule:
    - cron: "17 8 * * 1-5"
  workflow_dispatch:
    inputs:
      api_url:
        description: "Public API URL"
        required: true
        default: "https://maintenance-simulator-api.onrender.com"
      dashboard_url:
        description: "Public dashboard URL"
        required: true
        default: "https://maintenance-simulator-dashboard.onrender.com"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Verify live public demo
        env:
          API_URL: ${{ inputs.api_url || 'https://maintenance-simulator-api.onrender.com' }}
          DASHBOARD_URL: ${{ inputs.dashboard_url || 'https://maintenance-simulator-dashboard.onrender.com' }}
        run: |
          python scripts/verify_live_demo.py \
            --api-url "$API_URL" \
            --dashboard-url "$DASHBOARD_URL"
