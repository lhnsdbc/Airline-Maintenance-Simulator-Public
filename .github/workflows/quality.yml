name: public-quality

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  evidence:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install quality dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Generate synthetic fixtures
        run: |
          python generate_dummy_data.py
          python generate_mock_nr_artifact.py

      - name: Measure test coverage
        run: |
          coverage run -m unittest discover -s tests -v
          coverage report --skip-covered
          coverage xml

      - name: Lint public workflow code
        run: ruff check api analyst dashboard experiments scripts tests --select E9,F63,F7,F82

      - name: Type-check deployed-demo verifier
        run: mypy scripts/verify_live_demo.py

      - name: Audit service dependencies
        run: pip-audit -r requirements-service.txt

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
