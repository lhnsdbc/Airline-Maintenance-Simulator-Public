name: Deploy Azure Container Apps

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: Azure resource group created during the one-time setup
        required: true
        default: rg-aircraft-maintenance-demo
        type: string
      deploy:
        description: Deploy after confirming both GHCR packages are public
        required: true
        default: false
        type: boolean
  workflow_run:
    workflows: [public-simulator-ci]
    types: [completed]
    branches: [main]

permissions:
  contents: read
  id-token: write
  packages: write

env:
  API_IMAGE: ghcr.io/lhnsdbc/aircraft-maintenance-simulator-api
  DASHBOARD_IMAGE: ghcr.io/lhnsdbc/aircraft-maintenance-simulator-dashboard
  DEPLOY_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
  RESOURCE_GROUP: ${{ inputs.resource_group || 'rg-aircraft-maintenance-demo' }}

jobs:
  build_images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ env.DEPLOY_SHA }}
            ${{ env.API_IMAGE }}:main

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dashboard
          push: true
          tags: |
            ${{ env.DASHBOARD_IMAGE }}:${{ env.DEPLOY_SHA }}
            ${{ env.DASHBOARD_IMAGE }}:main

  deploy:
    needs: build_images
    if: (github.event_name == 'workflow_dispatch' && inputs.deploy) || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ env.DEPLOY_SHA }}

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: azure/cli@v2
        with:
          inlineScript: |
            az bicep install
            az deployment group create \
              --resource-group "${{ env.RESOURCE_GROUP }}" \
              --template-file infra/main.bicep \
              --parameters \
                apiImage="${{ env.API_IMAGE }}:${{ env.DEPLOY_SHA }}" \
                dashboardImage="${{ env.DASHBOARD_IMAGE }}:${{ env.DEPLOY_SHA }}" \
                deploymentVersion="${{ env.DEPLOY_SHA }}" \
                sqlAdminPassword="${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}"
