name: Deploy Azure Container Apps

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: Azure resource group created during the one-time setup
        required: true
        default: rg-aircraft-maintenance-demo
        type: string
      deploy:
        description: Deploy after confirming both GHCR packages are public
        required: true
        default: false
        type: boolean

permissions:
  contents: read
  id-token: write
  packages: write

env:
  API_IMAGE: ghcr.io/lhnsdbc/aircraft-maintenance-simulator-api
  DASHBOARD_IMAGE: ghcr.io/lhnsdbc/aircraft-maintenance-simulator-dashboard

jobs:
  build_images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:main

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dashboard
          push: true
          tags: |
            ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}
            ${{ env.DASHBOARD_IMAGE }}:main

  deploy:
    needs: build_images
    if: inputs.deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: azure/cli@v2
        with:
          inlineScript: |
            az bicep install
            az deployment group create \
              --resource-group "${{ inputs.resource_group }}" \
              --template-file infra/main.bicep \
              --parameters \
                apiImage="${{ env.API_IMAGE }}:${{ github.sha }}" \
                dashboardImage="${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}" \
                sqlAdminPassword="${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}"
